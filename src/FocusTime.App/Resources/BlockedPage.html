<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trang bị tạm khóa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        .message {
            font-size: 20px;
            margin: 20px 0;
            line-height: 1.6;
        }
        .countdown {
            font-size: 36px;
            font-weight: bold;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }
        .hint {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚫</h1>
        <div class="message">
            Trang này đang bị tạm khóa để giúp bạn giữ nhịp làm việc.
        </div>
        <div class="countdown" id="countdown">
            Hết hạn lúc: <span id="timeUntil">--:--</span>
        </div>
        <div class="hint">
            Sử dụng thời gian này để tập trung vào task của bạn 💪
        </div>
    </div>
    
    <script>
        // Get timeout time from query string
        const params = new URLSearchParams(window.location.search);
        const timeoutUntil = params.get('until');
        
        if (timeoutUntil) {
            document.getElementById('timeUntil').textContent = timeoutUntil;
        }
    </script>
</body>
</html>
